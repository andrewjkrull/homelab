services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/caddy:/data/caddy
    extra_hosts:
      - "step-ca.test:192.168.10.77"
      - "dockhand.test:192.168.10.77"
      - "flatnotes.test:192.168.10.77"
      - "vaultwarden.test:192.168.10.77"
    logging:
      driver: json-file
      options:
        max-size: 1M
        max-file: "2"
