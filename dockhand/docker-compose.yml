services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/dockhand:/app/data
    logging:
      driver: json-file
      options:
        max-size: 1M
        max-file: "2"
